<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Assistant - Farmer Advisory</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand" data-i18n="nav_brand">🌾 Farmer Advisory</div>
            <div class="nav-links">
                <a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
                <a href="advisory-services.html" data-i18n="nav_advisory">Advisory Services</a>
                <a href="crop-recommendation.html" data-i18n="nav_crop">Crop Recommendation</a>
                <a href="disease-detection.html" data-i18n="nav_disease">Disease Detection</a>
                <a href="chat.html" data-i18n="nav_chat">Chat Assistant</a>
                <button onclick="logout()" class="btn-secondary" data-i18n="btn_logout">Logout</button>
            </div>
        </div>
    </nav>

    <main class="chat-page">
        <div class="container">
            <div class="chat-container">
                <div class="chat-header">
                    <h2 data-i18n="chat_title">💬 Farming Assistant</h2>
                    <p data-i18n="chat_description">Ask me anything about farming!</p>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        <div class="message-content">
                            Hello! I'm your farming assistant. How can I help you today?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-container">
                    <form id="chatForm" >
                        <input 
                            type="text" 
                            id="chatInput" 
                            placeholder="Type your question here..."
                            autocomplete="off"
                        >
                        <button type="submit" class="btn-primary">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../config.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="../assets/js/chat.js"></script>
    <script>
        if (!Utils.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        function logout() {
            Utils.clearAuth();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
