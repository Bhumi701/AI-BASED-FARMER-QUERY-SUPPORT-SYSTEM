<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmer Advisory</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand" data-i18n="nav_brand">🌾 Farmer Advisory</div>
            <div class="nav-links">
                <a href="../index.html" data-i18n="nav_home">Home</a>
                <a href="register.html" data-i18n="nav_register">Register</a>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <h2 data-i18n="login_header">Login to Your Account</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-primary btn-block">Login</button>
                </form>
                <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </main>

    <script src="../config.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
