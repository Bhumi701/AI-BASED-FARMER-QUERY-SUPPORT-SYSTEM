<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Farmer Advisory</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand" data-i18n="nav_brand">🌾 Farmer Advisory</div>
            <div class="nav-links">
                <a href="../index.html" data-i18n="nav_home">Home</a>
                <a href="login.html" data-i18n="nav_login">Login</a>
            </div>
        </div>
    </nav>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <h2 data-i18n="register_header">Create Your Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Create a password">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="state">State</label>
                            <input type="text" id="state" placeholder="Your state">
                        </div>
                        <div class="form-group">
                            <label for="district">District</label>
                            <input type="text" id="district" placeholder="Your district">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="language">Preferred Language</label>
                        <select id="language">
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                            <option value="te">Telugu</option>
                            <option value="ta">Tamil</option>
                            <option value="bn">Bengali</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Register</button>
                </form>
                <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <script src="../config.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
