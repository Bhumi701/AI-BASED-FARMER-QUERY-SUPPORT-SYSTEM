<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather - Farmer Advisory System</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/weather.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand" data-i18n="nav_brand">🌾 Farmer Advisory</div>
      <div class="nav-links">
        <a href="../index.html" data-i18n="nav_home">Home</a>
        <a href="login.html" class="btn-primary" data-i18n="nav_login">Login</a>
        <a href="register.html" class="btn-secondary" data-i18n="nav_register">Register</a>
        <a href="weather.html" class="active" data-i18n="nav_weather">Weather</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="weather-panel">
      <h1 data-i18n="weather_title">Weather</h1>

      <div class="weather-controls">
        <input id="cityInput" type="text" placeholder="Enter city name (e.g., Lucknow)" />
        <button id="searchBtn" class="btn-primary">Search</button>
        <button id="geoBtn" class="btn-secondary">Use My Location</button>
      </div>

      <div id="message" class="info"></div>

      <div id="currentWeather" class="card hidden">
        <h2 id="locationName"></h2>
        <div class="current-grid">
          <div><strong>Temperature</strong><div id="temp"></div></div>
          <div><strong>Feels like</strong><div id="feels"></div></div>
          <div><strong>Humidity</strong><div id="humidity"></div></div>
          <div><strong>Wind</strong><div id="wind"></div></div>
          <div><strong>Pressure</strong><div id="pressure"></div></div>
          <div><strong>Clouds</strong><div id="clouds"></div></div>
        </div>
        <p id="description" class="muted"></p>
      </div>

      <div id="forecast" class="card hidden">
        <h3>Next 24 hours forecast</h3>
        <div id="forecastList" class="forecast-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Farmer Advisory System</p>
    </div>
  </footer>

  <script src="../config.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script src="../assets/js/weather.js"></script>
</body>
</html>
