<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation - Farmer Advisory</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand" data-i18n="nav_brand">🌾 Farmer Advisory</div>
            <div class="nav-links">
                <a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
                <a href="advisory-services.html" data-i18n="nav_advisory">Advisory Services</a>
                <a href="crop-recommendation.html" data-i18n="nav_crop">Crop Recommendation</a>
                <a href="disease-detection.html" data-i18n="nav_disease">Disease Detection</a>
                <a href="chat.html" data-i18n="nav_chat">Chat Assistant</a>
                <button onclick="logout()" class="btn-secondary" data-i18n="btn_logout">Logout</button>
            </div>
        </div>
    </nav>

    <main class="content-page">
        <div class="container">
            <h1 data-i18n="crop_title">🌱 Crop Recommendation</h1>
            <p data-i18n="crop_description">Enter soil parameters to get AI-powered crop recommendations</p>

            <div class="form-result-container">
                <!-- Input Form -->
                <div class="card">
                    <h3>Soil Parameters</h3>
                    <form id="cropForm">
                        <div class="form-group">
                            <label for="nitrogen">Nitrogen (N)</label>
                            <input type="number" id="nitrogen" required placeholder="0-100" min="0" max="150">
                        </div>
                        <div class="form-group">
                            <label for="phosphorus">Phosphorus (P)</label>
                            <input type="number" id="phosphorus" required placeholder="0-100" min="0" max="150">
                        </div>
                        <div class="form-group">
                            <label for="potassium">Potassium (K)</label>
                            <input type="number" id="potassium" required placeholder="0-100" min="0" max="150">
                        </div>
                        <div class="form-group">
                            <label for="temperature">Temperature (°C)</label>
                            <input type="number" id="temperature" required placeholder="15-40" min="0" max="50" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="humidity">Humidity (%)</label>
                            <input type="number" id="humidity" required placeholder="0-100" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label for="ph">Soil pH</label>
                            <input type="number" id="ph" required placeholder="3-10" min="3" max="10" step="0.1">
                        </div>
                        <div class="form-group">
                            <label for="rainfall">Rainfall (mm)</label>
                            <input type="number" id="rainfall" required placeholder="0-300" min="0" max="500">
                        </div>
                        <div class="form-group">
                            <label for="season">Season</label>
                            <select id="season">
                                <option value="Kharif">Kharif (Monsoon)</option>
                                <option value="Rabi">Rabi (Winter)</option>
                                <option value="Zaid">Zaid (Summer)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary btn-block">Get Recommendations</button>
                    </form>
                </div>

                <!-- Results -->
                <div class="card" id="resultsCard" style="display: none;">
                    <h3>Recommended Crops</h3>
                    <div id="recommendations"></div>
                    
                    <h3 style="margin-top: 30px;">Soil Analysis</h3>
                    <div id="soilAnalysis"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../config.js"></script>
    <script src="/assets/js/i18n.js"></script>
    <script src="../assets/js/crop.js"></script>
    <script>
        if (!Utils.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        function logout() {
            Utils.clearAuth();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
